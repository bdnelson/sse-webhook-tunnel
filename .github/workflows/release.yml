name: Release

# Build the CLI for macOS and Linux and attach the binaries to the release.
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Use the version pinned in go.mod.
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        run: |
          asset="sse-webhook-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}"
          make build-release \
            RELEASE_GOOS="${{ matrix.goos }}" \
            RELEASE_GOARCH="${{ matrix.goarch }}" \
            RELEASE_OUTPUT="$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Attach binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ASSET" --clobber
