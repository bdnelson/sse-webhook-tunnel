name: Tests

# Run the full test suite on every push.
on: push

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Use the version pinned in go.mod.
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: make test
